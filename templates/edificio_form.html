<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Edificio</title>
</head>
<body>

<h1>Crear Edificio</h1>

<form action="/ObjectCreator" method="POST">

    <!-- Nombre de la clase -->
    <input type="hidden" name="class_name" value="Edificio">

    <!-- Atributos del constructor -->
    <label>Dirección:</label><br>
    <input type="text" name="direccion" required><br><br>

    <label>Departamento:</label><br>
    <input type="text" name="departamento" required><br><br>

    <button type="submit">Crear</button>

</form>

</body>
</html>
