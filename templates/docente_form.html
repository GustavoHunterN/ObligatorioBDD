<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Docente</title>
</head>
<body>

<h1>Registrar Docente</h1>

{% with msgs = get_flashed_messages(with_categories=true) %}
  {% if msgs %}
      <ul>
      {% for cat, msg in msgs %}
        <li>[{{ cat }}] {{ msg }}</li>
      {% endfor %}
      </ul>
  {% endif %}
{% endwith %}

<form action="{{ url_for('crear_docente') }}" method="POST">

    <label>CI (sin letra):</label><br>
    <input type="text" name="ci" required><br><br>

    <label>Nombre:</label><br>
    <input type="text" name="nombre" required><br><br>

    <label>Apellido:</label><br>
    <input type="text" name="apellido" required><br><br>

    <label>Correo:</label><br>
    <input type="email" name="correo" required><br><br>

    <label>Contraseña:</label><br>
    <input type="password" name="contrasena" required><br><br>

    <button type="submit">Crear Docente</button>

</form>

<p><a href="/">Volver al menú</a></p>

<p><a href="{{ url_for('login_docente_form') }}">Iniciar Sesión</a></p>

</body>
</html>
