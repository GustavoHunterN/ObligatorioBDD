<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Registrar Programa</title>
</head>
<body>
    <h1>Nuevo Programa</h1>

      {% with msgs = get_flashed_messages(with_categories=true) %}
  {% if msgs %}
      <ul>
      {% for cat, msg in msgs %}
        <li>[{{ cat }}] {{ msg }}</li>
      {% endfor %}
      </ul>
  {% endif %}
{% endwith %}

    <form method="post" action="{{ url_for('object_creator') }}">
        <input type="hidden" name="class_name" value="Programa">

        <label>Nombre:
            <input type="text" name="nombre" required>
        </label>
        <br>

        <label>Facultad:
            <select name="nombre_facultad" required>
                {% for f in facultades %}
                    <option value="{{ f.nombre }}">{{ f.nombre }}</option>
                {% endfor %}
            </select>
        </label>
        <br>

        <label>Tipo:
            <select name="tipo">
                <option value="Grado">Grado</option>
                <option value="Posgrado">Posgrado</option>
            </select>
        </label>
        <br>

        <button type="submit">Registrar</button>
    </form>

    <a href="{{ url_for('index') }}">Volver</a>
</body>
</html>
