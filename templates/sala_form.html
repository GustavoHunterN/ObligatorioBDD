<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generar Salas</title>
</head>
<body>

<h1>Generar salas automáticamente</h1>

<form action="/ObjectCreator" method="POST">
    <input type="hidden" name="class_name" value="Sala">

    <!-- EDIFICIO -->
    <label>Edificio:</label>
    <select name="edificio" required>
        {% for e in edificios %}
            <option value="{{ e.nombre_edificio }}">{{ e.nombre_edificio }}</option>
        {% endfor %}
    </select>
    <br><br>

    <!-- CANTIDAD -->
    <label>Cantidad de salas a crear:</label>
    <input type="number" name="cantidad" min="1" required>
    <br><br>

    <!-- CAPACIDAD -->
    <label>Capacidad por sala:</label>
    <input type="number" name="capacidad" min="1" required>
    <br><br>

    <!-- TIPO -->
    <label>Tipo de sala:</label>
    <select name="tipo" required>
        <option value="Grado">Grado</option>
        <option value="Posgrado">Posgrado</option>
        <option value="Libre">Libre</option>
    </select>
    <br><br>

    <button type="submit">Crear salas</button>

</form>

<p><a href="/">Volver al inicio</a></p>

</body>
</html>
