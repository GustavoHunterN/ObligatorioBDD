<h1>Seleccionar participantes</h1>

<p>Programa: {{ programa }}</p>
<p>Sala: {{ sala }}</p>
<p>Capacidad máxima: {{ capacidad }}</p>

<form action="/ObjectCreator" method="POST">

    <input type="hidden" name="class_name" value="Reserva">
    <input type="hidden" name="sala" value="{{ sala }}">
    <input type="hidden" name="id_turno" value="{{ id_turno }}">
    <input type="hidden" name="fecha" value="{{ fecha }}">
    <input type="hidden" name="estado" value="Activa">
    <input type="hidden" name="ci_sesion" value="{{ session['ci'] }}">

    {% for p in participantes %}
        <div>
            <label>
                <input type="checkbox" name="participantes[]" value="{{ p.ci }}">
                {{ p.nombre }} {{ p.apellido }} ({{ p.ci }})
            </label>
        </div>
    {% endfor %}

    <button type="submit">Confirmar reserva</button>

</form>

<script>
const capacidad = {{ capacidad }};
const checks = document.querySelectorAll("input[type=checkbox]");

checks.forEach(c => {
    c.addEventListener("change", () => {
        let count = [...checks].filter(x => x.checked).length;
        if (count > capacidad) {
            alert("Capacidad máxima alcanzada");
            c.checked = false;
        }
    });
});
</script>
